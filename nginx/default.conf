# --- サーバーブロック1: HTTP(80番)をHTTPS(443番)へ案内する専門係 ---
# http://mokko.jp でアクセスが来た場合のルール
server {
    listen 80;
    server_name mokko.jp; # あなたのドメイン名

    # Let's Encryptがドメインの所有者確認(認証)に来た時だけは、
    # 例外的に80番ポートで直接応答する
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 上記以外のすべてのアクセスは、HTTPSの同じURLに案内し直す(リダイレクト)
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- サーバーブロック2: HTTPS(443番)のメイン受付 ---
# https://mokko.jp でアクセスが来た場合のルール
server {
    listen 443 ssl; # 443番ポートで、SSL/TLS通信を待ち受ける
    server_name mokko.jp; # あなたのドメイン名

    # SSL証明書ファイルの場所を指定 (Certbotと共有している場所)
    ssl_certificate /etc/letsencrypt/live/mokko.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mokko.jp/privkey.pem;

    # /hello/ というパスでアクセスが来た場合のルール (変更なし)
    location /hello/ {
        proxy_pass http://webapp:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /tetris/ というパスでアクセスが来た場合のルール (変更なし)
    location /tetris/ {
        proxy_pass http://tetris:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}